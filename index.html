<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Formulario</title>
</head>
<body>
    <header class="header">
        <div class="header__title">
            <h1>NovaTech Solutions</h1>
        </div>
    </header>
    <main class="main">
        <form class="form">
            <h2 class="form__title">Formulario de registro</h2>
            <div class="form__input-container">
                <label for="nombre">Nombre completo</label>
                    <input name="nombre" id="nombre" type="text" placeholder="John Doe" required>
                    <small class="error-message"></small>
            </div>
            <div class="form__input-container">
                <label for="email">E-mail</label>
                    <input name="email" id="email" type="email" placeholder="Mail@example.com" required>
                    <small class="error-message"></small>
            </div>
            <div class="form__input-container">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input name="password" id="password" type="password" placeholder="Example123" required>
                    <button class="material-symbols-outlined eye__password toggle-password" type="button">Visibility_off</button>
                </div>
                <small class="error-message"></small>
            </div>
            <div class="form__input-container">
                <label for="confirmPassword">Confirmacion de contraseña</label>
                <div class="password-wrapper">
                    <input name="confirmPassword" id="confirmPassword" type="password" placeholder="Example123" required>
                    <button class="material-symbols-outlined eye__confirmPassword toggle-password" type="button">Visibility_off</button>
                </div>
                    <small class="error-message"></small>
            </div>
            <div class="form__input-container">
                <label for="checkbox">Aceptar terminos y condiciones</label>
                <input name="checkbox" id="checkbox" type="checkbox" required>
                <small class="error-message"></small>
            </div>
            <div class="form__input-container">
                <input type="submit" class="boton">
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
